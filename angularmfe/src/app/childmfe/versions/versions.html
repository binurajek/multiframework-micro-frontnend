<div class="space-y-10 font-outfit">

    <header class="mb-10 text-center">
        <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight mb-2">Angular Versions</h2>
        <p class="text-slate-500 text-lg">A history of major Angular releases and features</p>
    </header>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        <mat-card *ngFor="let v of versions"
            class="!rounded-2xl !p-0 shadow-sm bg-white/60 backdrop-blur-sm border-t-4 !min-h-[150px] !h-full" [ngClass]="v.color">
            <div class="p-4 h-full flex flex-col items-center justify-center text-center">
                <h3 style="font-size: 3rem; font-weight: 900; margin: 0 0 10px 0; color: #1e293b">{{v.version}}</h3>
                <p class="text-sm font-bold text-green-600 mb-3">Released: {{v.year}}</p>
                <p class="text-slate-500 text-xs leading-snug">{{v.description}}</p>
            </div>
        </mat-card>
    </div>
</div>
